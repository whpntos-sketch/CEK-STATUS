<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Status Transaksi</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: linear-gradient(135deg, #007BFF, #00C6FF);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    input {
      padding: 10px;
      margin: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 250px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      background: #007BFF;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0056b3;
    }
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #007BFF;
      color: white;
      cursor: pointer;
    }
    tr:hover {
      background: #f1f9ff;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
    .pagination {
      margin: 20px;
      text-align: center;
    }
    .pagination button {
      margin: 2px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #00C6FF;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .pagination button:hover {
      background: #0099cc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cek Status Transaksi</h1>
    <input type="text" id="telepon" placeholder="Masukkan Nomor Telepon">
    <button onclick="cekStatus()">Cek</button>
  </header>
  <div id="result"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";

    let currentPage = 1;
    const rowsPerPage = 5;
    let currentData = [];

    async function cekStatus() {
      const telepon = document.getElementById("telepon").value;
      if (!telepon) return alert("Masukkan nomor telepon!");
      const res = await fetch(`${API_URL}?telepon=${telepon}`);
      const data = await res.json();
      currentData = data;
      currentPage = 1;
      renderTable();
    }

    function renderTable() {
      if (currentData.length === 0) {
        document.getElementById("result").innerHTML = "<p style='text-align:center;'>Tidak ada data ditemukan.</p>";
        return;
      }

      // filter agar UID dan Nomor tidak ditampilkan
      const headers = Object.keys(currentData[0]).filter(h => h !== "UID" && h !== "Nomor");

      let table = "<table class='fade-in'><thead><tr>";
      headers.forEach(h => table += `<th onclick="sortTable('${h}')">${h}</th>`);
      table += "</tr></thead><tbody>";

      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const pageData = currentData.slice(start, end);

      pageData.forEach(row => {
        table += "<tr>";
        headers.forEach(h => table += `<td>${row[h]}</td>`);
        table += "</tr>";
      });

      table += "</tbody></table>";
      table += renderPagination();
      document.getElementById("result").innerHTML = table;
    }

    function sortTable(header) {
      currentData.sort((a, b) => (a[header] > b[header]) ? 1 : -1);
      renderTable();
    }

    function renderPagination() {
      const totalPages = Math.ceil(currentData.length / rowsPerPage);
      let buttons = "<div class='pagination'>";
      for (let i = 1; i <= totalPages; i++) {
        buttons += `<button onclick="goToPage(${i})">${i}</button>`;
      }
      buttons += "</div>";
      return buttons;
    }

    function goToPage(page) {
      currentPage = page;
      renderTable();
    }
  </script>
</body>
</html>
