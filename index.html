<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CEK STATUS PESANAN</title>

<style>
:root {
  --primary: #2563eb;
  --primary-soft: #eff6ff;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --radius: 14px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ===== HEADER ===== */
header {
  padding: 48px 20px 64px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 2rem;
  letter-spacing: 1px;
}

header p {
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.95rem;
}

/* ===== SEARCH CARD ===== */
.search-card {
  max-width: 520px;
  margin: -40px auto 24px;
  background: var(--card);
  padding: 24px;
  border-radius: var(--radius);
  box-shadow: 0 20px 40px rgba(0,0,0,.08);
}

.search-box {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px 16px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  font-size: .95rem;
}

input:focus {
  outline: none;
  border-color: var(--primary);
}

button {
  padding: 14px 22px;
  border-radius: 10px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover { opacity: .9; }

/* ===== CONTENT ===== */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 0 16px 60px;
}

.message {
  text-align: center;
  color: var(--muted);
  font-weight: 500;
  padding: 24px 0;
}

/* ===== TABLE CARD ===== */
.table-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: 0 16px 32px rgba(0,0,0,.06);
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-transform: uppercase;
  font-size: .85rem;
}

th, td {
  padding: 14px 16px;
  text-align: center;
}

th {
  background: var(--primary-soft);
  color: var(--primary);
  cursor: pointer;
  font-weight: 700;
}

tbody tr:hover { background: #f1f5f9; }

/* ===== STATUS ===== */
.status-selesai { color:#15803d; font-weight:700; }
.status-pemesanan { color:#b45309; font-weight:700; }
.status-backorder { color:#b91c1c; font-weight:700; }
.status-readi { color:#0369a1; font-weight:700; }

/* ===== PAGINATION ===== */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 20px;
}

.pagination button {
  background: #e2e8f0;
  color: var(--text);
  border-radius: 8px;
  padding: 8px 14px;
}

.pagination button:hover {
  background: var(--primary);
  color: white;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  header h1 { font-size: 1.6rem; }
  .search-box { flex-direction: column; }
}
</style>
</head>

<body>

<header>
  <h1>CEK STATUS PESANAN</h1>
  <p>Masukkan nomor telepon untuk melihat status pesanan</p>
</header>

<div class="search-card">
  <div class="search-box">
    <input
      id="telepon"
      type="tel"
      maxlength="15"
      placeholder="Nomor Telepon"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    />
    <button onclick="cekStatus()">Cek</button>
  </div>
</div>

<div class="container">
  <div id="result"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const ROWS = 5;

let data = [];
let page = 1;
let sort = {};

document.getElementById("telepon")
  .addEventListener("keydown", e => e.key === "Enter" && cekStatus());

function msg(text) {
  document.getElementById("result").innerHTML =
    `<div class="message">${text}</div>`;
}

async function cekStatus() {
  const t = telepon.value;
  if (t.length < 8) return msg("Nomor telepon tidak valid");

  msg("Memuat data...");

  try {
    const r = await fetch(`${API_URL}?telepon=${t}`);
    const j = await r.json();
    data = Array.isArray(j) ? j : [];
    page = 1;
    render();
  } catch {
    msg("Gagal mengambil data");
  }
}

function render() {
  if (!data.length) return msg("Data tidak ditemukan");

  const headers = Object.keys(data[0]).filter(h => !["UID","Nomor"].includes(h));
  const slice = data.slice((page-1)*ROWS, page*ROWS);

  let h = `<div class="table-card"><table><thead><tr>`;
  headers.forEach(x => h += `<th onclick="sortBy('${x}')">${x}</th>`);
  h += `</tr></thead><tbody>`;

  slice.forEach(r => {
    h += "<tr>";
    headers.forEach(k => {
      let v = r[k] ?? "";
      let c = "";
      if (k.toLowerCase().includes("tanggal")) v = fmt(v);
      if (k.toLowerCase() === "status") c = "status-" + v.toLowerCase();
      h += `<td class="${c}">${v}</td>`;
    });
    h += "</tr>";
  });

  h += "</tbody></table></div>" + pager();
  result.innerHTML = h;
}

function pager() {
  let p = Math.ceil(data.length / ROWS);
  let h = `<div class="pagination">`;
  for (let i=1;i<=p;i++) h += `<button onclick="goto(${i})">${i}</button>`;
  return h + "</div>";
}

function goto(i){ page=i; render(); }

function sortBy(k){
  sort[k]=!sort[k];
  data.sort((a,b)=>a[k]>b[k]?(sort[k]?1:-1):(sort[k]?-1:1));
  render();
}

function fmt(v){
  const d=new Date(v);
  return isNaN(d)?v:d.toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});
}
</script>

</body>
</html>
