<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INFORMASI STATUS ORDER</title>

<meta name="description" content="Cek status pesanan Order">
<meta name="robots" content="noindex,nofollow">

<style>
:root{
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --radius:14px;
  --shadow:0 16px 32px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Inter,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:56px 20px 96px;
  text-align:center;
  background:linear-gradient(180deg,#fff,#f1f5f9);
}
header h1{margin:0;font-size:2rem}
header p{margin-top:8px;color:var(--muted);font-size:.95rem}

/* SEARCH */
.search-card{
  max-width:520px;
  margin:-56px auto 24px;
  background:var(--card);
  padding:24px;
  border-radius:var(--radius);
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}
.search-box{display:flex;gap:10px}
input{
  flex:1;
  padding:14px 16px;
  border-radius:10px;
  border:1px solid #e2e8f0;
}
input:focus,button:focus{
  outline:3px solid var(--primary-soft);
  border-color:var(--primary);
}
button{
  padding:14px 22px;
  border-radius:10px;
  border:none;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* CONTENT */
.container{max-width:1100px;margin:auto;padding:0 16px 64px}

/* MESSAGE */
.message{text-align:center;padding:32px 0;color:var(--muted);font-weight:500}

/* SUCCESS */
.alert-success{
  background:#ecfeff;
  border-left:5px solid var(--primary);
  padding:14px 16px;
  border-radius:10px;
  margin-bottom:16px;
  font-size:.9rem;
}

/* LOADER */
.loader{
  width:40px;
  height:40px;
  border:4px solid #e2e8f0;
  border-top:4px solid var(--primary);
  border-radius:50%;
  margin:32px auto;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABLE */
.table-card{
  background:white;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow-x:auto;
}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:14px 16px;text-align:center}
th{
  background:var(--primary-soft);
  color:var(--primary);
  cursor:pointer;
}
tbody tr:hover{background:#f1f5f9}

/* STATUS FINAL */
td[class^="status-"]{
  font-weight:700;
  text-transform:uppercase;
  border-radius:8px;
}
.status-selesai{background:#dcfce7;color:#15803d}
.status-pemesanan{background:#fef9c3;color:#92400e}
.status-backorder{background:#fee2e2;color:#b91c1c}
.status-ready{background:#dbeafe;color:#1e40af}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:6px;padding:20px}
.pagination button{background:#e2e8f0;padding:8px 14px;border-radius:8px}
.pagination button.active{background:var(--primary);color:white}

/* INFO */
.info-hero{margin-top:24px;display:flex;justify-content:center}
.info-card{
  background:var(--primary-soft);
  max-width:720px;
  padding:20px;
  border-radius:var(--radius);
  font-size:.85rem;
}
footer{text-align:center;padding:48px 16px;font-size:.8rem;color:var(--muted)}
@media(max-width:600px){
  header h1{font-size:1.6rem}
  .search-box{flex-direction:column}
}
</style>
</head>

<body>

<header>
  <h1>INFORMASI STATUS ORDER</h1>
  <p>silakan masukkan data untuk melanjutkan</p>
</header>

<div class="search-card">
  <div class="search-box">
    <input id="telepon" type="tel" maxlength="15"
      placeholder="Nomor Telepon"
      inputmode="numeric"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <button onclick="cekStatus()">PERIKSA</button>
  </div>
</div>

<div class="container">
  <div id="result"></div>
</div>

<footer>
  © 2026 · UnOfficial by <strong>Madētha</strong>
</footer>

<script>
/* ================= CONFIG ================= */
const API_URL="https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const ROWS=5;
const CACHE_TTL=5*60*1000; // 5 MENIT

/* ================= STATE ================= */
const STATE={data:[],page:1,sort:{}};

/* ================= HELPER ================= */
const STATUS_MAP={
  selesai:"status-selesai",
  pemesanan:"status-pemesanan",
  backorder:"status-backorder",
  ready:"status-ready"
};

const result=document.getElementById("result");
const showMessage=t=>result.innerHTML=`<div class="message">${t}</div>`;
const showLoader=()=>result.innerHTML=`<div class="loader"></div>`;

const normalizeStatus=s=>String(s).toLowerCase().replace(/\s+/g,"").replace("readi","ready");
const formatDate=v=>{
  const d=new Date(v);
  return isNaN(d)?v:d.toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});
};

/* ================= CLIENT CACHE ================= */
function getCache(key){
  try{
    const raw=localStorage.getItem(key);
    if(!raw)return null;
    const {data,time}=JSON.parse(raw);
    if(Date.now()-time>CACHE_TTL)return null;
    return data;
  }catch{ return null; }
}
function setCache(key,data){
  localStorage.setItem(key,JSON.stringify({data,time:Date.now()}));
}

/* ================= FETCH ================= */
async function cekStatus(){
  const tel=document.getElementById("telepon").value;
  if(tel.length<8)return showMessage("☎ Data tidak sesuai, mohon cek data input");

  const cacheKey="cekstatus_"+tel;
  const cached=getCache(cacheKey);
  if(cached){
    STATE.data=cached;
    STATE.page=1;
    return render();
  }

  showLoader();
  try{
    const r=await fetch(`${API_URL}?telepon=${encodeURIComponent(tel)}`);
    const j=await r.json();
    STATE.data=Array.isArray(j)?j:[];
    setCache(cacheKey,STATE.data);
    STATE.page=1;
    render();
  }catch{
    showMessage("⚠️ GAGAL MENGAMBIL DATA");
  }
}

/* ================= RENDER ================= */
function render(){
  if(!STATE.data.length)return showMessage("📝 Data tidak ditemukan, periksa formulir silakan membuat order");

  const HIDE=["uid","nomor","kode part"];
  const headers=Object.keys(STATE.data[0])
    .filter(h=>!HIDE.includes(h.toLowerCase().trim()));

  const start=(STATE.page-1)*ROWS;
  const slice=STATE.data.slice(start,start+ROWS);

  let html=`<div class="table-card"><table><thead><tr>`;
  headers.forEach(h=>html+=`<th onclick="sortBy('${h}')">${h}</th>`);
  html+=`</tr></thead><tbody>`;

  slice.forEach(r=>{
    html+=`<tr>`;
    headers.forEach(k=>{
      let v=r[k]??"",cls="";
      if(k.toLowerCase().includes("tanggal"))v=formatDate(v);
      if(k.toLowerCase()==="status")cls=STATUS_MAP[normalizeStatus(v)]||"";
      html+=`<td class="${cls}">${v}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table></div>`+pagination()+statusInfo();
  result.innerHTML=html;
}

/* ================= SORT & PAGING ================= */
function sortBy(k){
  STATE.sort[k]=!STATE.sort[k];
  const asc=STATE.sort[k];
  STATE.data.sort((a,b)=>
    asc?String(a[k]).localeCompare(String(b[k])):String(b[k]).localeCompare(String(a[k]))
  );
  render();
}
function pagination(){
  const pages=Math.ceil(STATE.data.length/ROWS);
  let h=`<div class="pagination">`;
  for(let i=1;i<=pages;i++)
    h+=`<button class="${i==STATE.page?"active":""}" onclick="STATE.page=${i};render()">${i}</button>`;
  return h+`</div>`;
}
function statusInfo(){
  return `
  <section class="info-hero">
    <div class="info-card">
      <strong>🪧 KETERANGAN STATUS :</strong>
      <ul>
        <li><b>READY</b> : Pesanan telah tersedia, siap untuk diambil atau pickup</li>
        <li><b>PEMESANAN</b> : Dalam proses pemesanan ke Cabang atau Pusat Spare Part</li>
        <li><b>BACKORDER</b> : Stok tidak tersedia atau menunggu produksi dari Supplier</li>
        <li><b>SELESAI</b> : Pesanan telah selesai diproses dan ditutup</li>
        <li><i>*** Detail keterangan tambahan mengacu pada tabel</i></li>
      </ul>
    </div>
  </section>`;
}
  
</script>

</body>
</html>
