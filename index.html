<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CEK STATUS TRANSAKSI</title>

<style>
/* ================== GLOBAL ================== */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  background: #f4f6f9;
  color: #333;
}

header {
  background: linear-gradient(135deg, #007BFF, #00C6FF);
  color: white;
  padding: 24px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

input {
  padding: 10px;
  width: 260px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #007BFF;
  color: white;
}

button:hover { background: #0056b3; }

#result {
  margin: 20px;
  text-align: center;
}

/* ================== TABLE ================== */
table {
  width: 95%;
  margin: auto;
  border-collapse: collapse;
  background: white;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007BFF;
  color: white;
  cursor: pointer;
  user-select: none;
  text-transform: uppercase;
}

th span {
  font-size: 10px;
  margin-left: 6px;
}

tr:hover { background: #f1f9ff; }

/* ================== STATUS ================== */
.status-selesai { background:#d4edda; color:#155724; font-weight:bold; }
.status-pemesanan { background:#fff3cd; color:#856404; font-weight:bold; }
.status-backorder { background:#f8d7da; color:#721c24; font-weight:bold; }
.status-readi { background:#d1ecf1; color:#0c5460; font-weight:bold; }

/* ================== PAGINATION ================== */
.pagination {
  margin: 20px;
}

.pagination button {
  margin: 4px;
  padding: 8px 14px;
  background: #00C6FF;
  border-radius: 6px;
}

/* ================== LOADING ================== */
.loading {
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h1>CEK STATUS TRANSAKSI</h1>
  <input type="text" id="telepon" placeholder="CONTOH: 08123456789" />
  <button onclick="cekStatus()">CEK</button>
</header>

<div id="result"></div>

<script>
/* ================== CONFIG ================== */
const API_URL = "https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const API_KEY = "ISI_API_KEY_KAMU"; // WAJIB SAMA DENGAN DI APPS SCRIPT

const ROWS_PER_PAGE = 5;

/* ================== STATE ================== */
let dataGlobal = [];
let currentPage = 1;
let sortConfig = { key: null, asc: true };

/* ================== VALIDATION ================== */
function validTelepon(input) {
  return /^[0-9]{9,14}$/.test(input);
}

/* ================== MAIN ================== */
async function cekStatus() {
  const telepon = document.getElementById("telepon").value.trim();
  const result = document.getElementById("result");

  if (!validTelepon(telepon)) {
    alert("MASUKKAN NOMOR TELEPON YANG VALID (ANGKA SAJA)");
    return;
  }

  result.innerHTML = "<div class='loading'>MEMUAT DATA...</div>";

  try {
    const res = await fetch(`${API_URL}?telepon=${telepon}&key=${API_KEY}`);
    if (!res.ok) throw new Error("Gagal koneksi server");

    const json = await res.json();
    if (!Array.isArray(json) || json.length === 0) {
      result.innerHTML = "<p>TIDAK ADA DATA DITEMUKAN</p>";
      return;
    }

    dataGlobal = json;
    currentPage = 1;
    renderTable();

  } catch (err) {
    console.error(err);
    result.innerHTML = "<p>TERJADI KESALAHAN, SILAKAN COBA LAGI</p>";
  }
}

/* ================== UTIL ================== */
function formatTanggal(val) {
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleDateString("id-ID", { day:"2-digit", month:"long", year:"numeric" });
}

/* ================== RENDER ================== */
function renderTable() {
  const result = document.getElementById("result");

  const headers = Object.keys(dataGlobal[0]).filter(h => !["UID","Nomor"].includes(h));
  const start = (currentPage - 1) * ROWS_PER_PAGE;
  const pageData = dataGlobal.slice(start, start + ROWS_PER_PAGE);

  let html = "<table><thead><tr>";
  headers.forEach(h => {
    const arrow = sortConfig.key === h ? (sortConfig.asc ? "▲" : "▼") : "";
    html += `<th onclick="sortTable('${h}')">${h}<span>${arrow}</span></th>`;
  });
  html += "</tr></thead><tbody>";

  pageData.forEach(row => {
    html += "<tr>";
    headers.forEach(h => {
      let val = row[h];
      let cls = "";
      if (h.toLowerCase().includes("tanggal")) val = formatTanggal(val);
      if (h.toLowerCase() === "status") cls = "status-" + val.toLowerCase();
      html += `<td class="${cls}">${val ?? "-"}</td>`;
    });
    html += "</tr>";
  });

  html += "</tbody></table>";
  html += renderPagination();
  result.innerHTML = html;
}

/* ================== SORTING ================== */
function sortTable(key) {
  sortConfig.asc = sortConfig.key === key ? !sortConfig.asc : true;
  sortConfig.key = key;

  dataGlobal.sort((a, b) => {
    if (a[key] > b[key]) return sortConfig.asc ? 1 : -1;
    if (a[key] < b[key]) return sortConfig.asc ? -1 : 1;
    return 0;
  });

  renderTable();
}

/* ================== PAGINATION ================== */
function renderPagination() {
  const pages = Math.ceil(dataGlobal.length / ROWS_PER_PAGE);
  if (pages <= 1) return "";

  let html = "<div class='pagination'>";
  for (let i = 1; i <= pages; i++) {
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }
  html += "</div>";
  return html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
}
</script>

</body>
</html>
