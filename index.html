<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Status Pesanan</title>

<meta name="description" content="Cek status pesanan pelanggan">
<meta name="robots" content="noindex,nofollow">

<style>
:root{
  --primary:#2563eb;
  --primary-gradient:linear-gradient(135deg,#2563eb,#3b82f6);
  --success:#16a34a;
  --warning:#ca8a04;
  --danger:#dc2626;
  --info:#0284c7;

  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;

  --radius:16px;
  --shadow:0 24px 48px rgba(0,0,0,.08);
}

/* RESET */
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,"Segoe UI",system-ui,sans-serif;
  background:radial-gradient(circle at top,#e0e7ff,#f8fafc 60%);
  color:var(--text);
}

/* HEADER */
header{
  padding:56px 20px 80px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:2.2rem;
  letter-spacing:1px;
}

header p{
  margin-top:10px;
  color:var(--muted);
}

/* SEARCH */
.search-card{
  max-width:540px;
  margin:-56px auto 32px;
  background:var(--card);
  padding:26px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  animation:fadeUp .6s ease;
}

.search-box{
  display:flex;
  gap:12px;
}

input{
  flex:1;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  font-size:.95rem;
  transition:.25s;
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

button{
  padding:14px 24px;
  border-radius:12px;
  border:none;
  background:var(--primary-gradient);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(37,99,235,.3);
}

/* CONTENT */
.container{
  max-width:1100px;
  margin:auto;
  padding:0 16px 72px;
}

.message{
  text-align:center;
  color:var(--muted);
  padding:36px 0;
  animation:fade .3s ease;
}

/* LOADER */
.loader{
  width:46px;
  height:46px;
  border:4px solid #e5e7eb;
  border-top:4px solid #2563eb;
  border-radius:50%;
  margin:28px auto;
  animation:spin 1s linear infinite;
}

/* TABLE */
.table-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  animation:fadeUp .4s ease;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:.88rem;
}

th,td{
  padding:14px 18px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#eef2ff;
  color:#1e3a8a;
  font-weight:700;
  cursor:pointer;
}

th:hover{
  background:#e0e7ff;
}

tbody tr{
  transition:.2s;
}

tbody tr:hover{
  background:#f8fafc;
  transform:scale(1.005);
}

/* STATUS */
td[class^="status-"]{
  font-weight:700;
  text-transform:uppercase;
  border-radius:999px;
  padding:6px 14px;
  font-size:.75rem;
  display:inline-block;
}

.status-selesai{background:#dcfce7;color:var(--success)}
.status-pemesanan{background:#fef9c3;color:var(--warning)}
.status-backorder{background:#fee2e2;color:var(--danger)}
.status-ready{background:#dbeafe;color:var(--info)}

.highlight{
  background:#fff7ed!important;
}

/* PAGINATION */
.pagination{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:24px;
}

.pagination button{
  background:#e5e7eb;
  color:#0f172a;
}

.pagination button.active{
  background:var(--primary-gradient);
  color:white;
}

/* ANIMATION */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

@media(max-width:600px){
  header h1{font-size:1.7rem}
  .search-box{flex-direction:column}
}
</style>
</head>

<body>

<header>
  <h1>Status Pesanan</h1>
  <p>Masukkan nomor telepon untuk melihat status pesanan Anda</p>
</header>

<div class="search-card">
  <div class="search-box">
    <input id="telepon" type="tel" maxlength="15"
      placeholder="Nomor Telepon"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
    <button onclick="cekStatus()">Cek</button>
  </div>
  <div style="text-align:center;margin-top:12px">
    <button style="background:#e5e7eb;color:#0f172a"
      onclick="resetSearch()">Reset</button>
  </div>
</div>

<div class="container">
  <div id="result"></div>
</div>

<script>
/* CONFIG */
const API_URL="https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const ROWS=5;

/* STATE */
let STATE={data:[],page:1,sort:{}};

/* MAP */
const STATUS_MAP={
  selesai:"status-selesai",
  pemesanan:"status-pemesanan",
  backorder:"status-backorder",
  ready:"status-ready"
};

const result=document.getElementById("result");
const telInput=document.getElementById("telepon");

telInput.addEventListener("keydown",e=>e.key==="Enter"&&cekStatus());

/* UTILS */
function showMessage(t){result.innerHTML=`<div class="message">${t}</div>`}
function showLoader(){result.innerHTML=`<div class="loader"></div>`}

function formatDate(v){
  const d=new Date(v);
  return isNaN(d)?v:
  d.toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});
}

function normalizeStatus(v){
  return v.toLowerCase().replace(/\s+/g,"").replace("readi","ready");
}

/* CACHE */
const CACHE_TTL=300000;
function setCache(k,d){
  localStorage.setItem("cek-"+k,JSON.stringify({t:Date.now(),d}));
}
function getCache(k){
  const c=localStorage.getItem("cek-"+k);
  if(!c)return null;
  const o=JSON.parse(c);
  return Date.now()-o.t>CACHE_TTL?null:o.d;
}

/* FETCH */
async function cekStatus(){
  const t=telInput.value;
  if(t.length<8)return showMessage("Nomor tidak valid");

  const c=getCache(t);
  if(c){STATE.data=c;STATE.page=1;return render();}

  showLoader();
  const controller=new AbortController();
  setTimeout(()=>controller.abort(),8000);

  try{
    const r=await fetch(`${API_URL}?telepon=${t}`,{signal:controller.signal});
    const j=await r.json();
    STATE.data=Array.isArray(j)?j:[];
    setCache(t,STATE.data);
    render();
  }catch{
    showMessage("Koneksi bermasalah, coba lagi");
  }
}

/* RENDER */
function render(){
  if(!STATE.data.length)return showMessage("Data tidak ditemukan");

  const headers=Object.keys(STATE.data[0]).filter(h=>!["UID","Nomor"].includes(h));
  const start=(STATE.page-1)*ROWS;
  const rows=STATE.data.slice(start,start+ROWS);

  let html=`<div class="message">Ditemukan <b>${STATE.data.length}</b> data</div>`;
  html+=`<div class="table-card"><table><thead><tr>`;
  headers.forEach(h=>html+=`<th onclick="sortBy('${h}')">${h}</th>`);
  html+=`</tr></thead><tbody>`;

  rows.forEach(r=>{
    html+=`<tr class="${Object.values(r).includes(telInput.value)?'highlight':''}">`;
    headers.forEach(k=>{
      let v=r[k]??"",cls="";
      if(k.toLowerCase().includes("tanggal"))v=formatDate(v);
      if(k.toLowerCase()==="status")
        cls=STATUS_MAP[normalizeStatus(v)]||"";
      html+=`<td class="${cls}">${v}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table></div>`;
  html+=pagination();
  result.innerHTML=html;
}

/* SORT */
function sortBy(k){
  STATE.sort[k]=!STATE.sort[k];
  const asc=STATE.sort[k];
  STATE.data.sort((a,b)=>{
    return asc
      ?String(a[k]).localeCompare(String(b[k]))
      :String(b[k]).localeCompare(String(a[k]));
  });
  render();
}

/* PAGINATION */
function pagination(){
  const pages=Math.ceil(STATE.data.length/ROWS);
  let h=`<div class="pagination">`;
  if(STATE.page>1)h+=`<button onclick="goto(${STATE.page-1})">Prev</button>`;
  for(let i=1;i<=pages;i++)
    h+=`<button class="${i===STATE.page?'active':''}"
      onclick="goto(${i})">${i}</button>`;
  if(STATE.page<pages)h+=`<button onclick="goto(${STATE.page+1})">Next</button>`;
  return h+`</div>`;
}

function goto(p){STATE.page=p;render()}
function resetSearch(){telInput.value="";STATE.data=[];result.innerHTML="";}
</script>

</body>
</html>
