<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INFORMASI STATUS ORDER</title>

<meta name="description" content="CEK STATUS ORDER">
<meta name="robots" content="noindex,nofollow">

<style>
:root{
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --radius:14px;
  --shadow:0 16px 32px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Inter,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:56px 20px 96px;
  text-align:center;
  background:linear-gradient(180deg,#fff,#f1f5f9);
}
header h1{margin:0;font-size:2rem}
header p{margin-top:8px;color:var(--muted);font-size:.95rem}

/* SEARCH */
.search-card{
  max-width:520px;
  margin:-56px auto 24px;
  background:var(--card);
  padding:24px;
  border-radius:var(--radius);
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}
.search-box{display:flex;gap:10px}
input{
  flex:1;
  padding:14px 16px;
  border-radius:10px;
  border:1px solid #e2e8f0;
}
input:focus,button:focus{
  outline:3px solid var(--primary-soft);
  border-color:var(--primary);
}
button{
  padding:14px 22px;
  border-radius:10px;
  border:none;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

/* CONTENT */
.container{max-width:1100px;margin:auto;padding:0 16px 64px}

/* MESSAGE */
.message{text-align:center;padding:32px 0;color:var(--muted);font-weight:500}

/* LOADER */
.loader{
  width:40px;
  height:40px;
  border:4px solid #e2e8f0;
  border-top:4px solid var(--primary);
  border-radius:50%;
  margin:32px auto;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABLE */
.table-card{
  background:white;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow-x:auto;
  animation:fade .3s ease-in-out;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:.85rem;
  white-space:nowrap; /* Mobile-first */
}
th,td{padding:14px 16px;text-align:center}
th{
  background:var(--primary-soft);
  color:var(--primary);
  cursor:pointer;
  position:relative;
}
th.sort-asc::after{content:"▲";font-size:.7rem;margin-left:6px}
th.sort-desc::after{content:"▼";font-size:.7rem;margin-left:6px}
tbody tr:hover{background:#f1f5f9}

/* STATUS */
td[class^="status-"]{
  font-weight:700;
  text-transform:uppercase;
  border-radius:8px;
}
.status-selesai{background:#dcfce7;color:#15803d}
.status-pemesanan{background:#fef9c3;color:#92400e}
.status-backorder{background:#fee2e2;color:#b91c1c}
.status-ready{background:#dbeafe;color:#1e40af}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:6px;padding:20px}
.pagination button{background:#e2e8f0;padding:8px 14px;border-radius:8px}
.pagination button.active{background:var(--primary);color:white}

/* INFO */
.info-hero{margin-top:24px;display:flex;justify-content:center}
.info-card{
  background:var(--primary-soft);
  max-width:720px;
  padding:20px;
  border-radius:var(--radius);
  font-size:.85rem;
}

/* FOOTER */
footer{
  text-align:center;
  padding:48px 16px;
  font-size:.8rem;
  color:#334155;
}
footer strong{
  color:#b91c1c;
  font-weight:700;
}

@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:none}
}
</style>
</head>

<body>

<header>
  <h1>INFORMASI STATUS ORDER</h1>
  <p>silakan masukkan data anda untuk melanjutkan</p>
</header>

<div class="search-card">
  <div class="search-box">
    <input id="telepon" type="tel" maxlength="15"
      placeholder="Nomor Telepon"
      inputmode="numeric">
    <button id="btnCek" onclick="cekStatus()">PERIKSA</button>
  </div>
</div>

<div class="container">
  <div id="result"></div>
</div>

<footer>
  © <span id="year"></span> · UnOfficial by <strong>Madētha</strong>
</footer>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const ROWS=5;
const CACHE_TTL=5*60*1000;

const STATE={data:[],page:1,sort:{key:null,asc:true}};
const result=document.getElementById("result");
const input=document.getElementById("telepon");
const btn=document.getElementById("btnCek");

/* UX */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter") cekStatus();
});
input.addEventListener("input",()=>{
  input.value=input.value.replace(/\D/g,"");
});

/* Cache */
const getCache=k=>{
  const r=localStorage.getItem(k);
  if(!r) return null;
  const {data,time}=JSON.parse(r);
  if(Date.now()-time>CACHE_TTL) return null;
  return data;
};
const setCache=(k,d)=>localStorage.setItem(k,JSON.stringify({data:d,time:Date.now()}));

const showMessage=t=>result.innerHTML=`<div class="message">${t}</div>`;
const showLoader=()=>result.innerHTML=`<div class="loader"></div>`;

async function cekStatus(){
  if(btn.disabled) return;
  const tel=input.value;
  if(tel.length<8) return showMessage("☎ Data tidak sesuai, mohon cek data input");

  btn.disabled=true;
  setTimeout(()=>btn.disabled=false,1200);

  const key="cek_"+tel;
  const cache=getCache(key);
  if(cache){
    STATE.data=cache; STATE.page=1; render(); return;
  }

  showLoader();
  try{
    const r=await fetch(`${API_URL}?telepon=${encodeURIComponent(tel)}`);
    const j=await r.json();
    STATE.data=Array.isArray(j)?j:[];
    setCache(key,STATE.data);
    STATE.page=1;
    render();
  }catch{
    showMessage("⚠️ GAGAL MENGAMBIL DATA");
  }
}

/* Render */
function render(){
  if(!STATE.data.length)
    return showMessage("📝 Data tidak ditemukan, periksa formulir silakan membuat order");

  const headers=Object.keys(STATE.data[0]);
  const start=(STATE.page-1)*ROWS;
  const rows=STATE.data.slice(start,start+ROWS);

  let h=`<div class="table-card"><table><thead><tr>`;
  headers.forEach(x=>{
    const s=STATE.sort.key===x?(STATE.sort.asc?"sort-asc":"sort-desc"):"";
    h+=`<th class="${s}" onclick="sortBy('${x}')">${x}</th>`;
  });
  h+=`</tr></thead><tbody>`;

  rows.forEach(r=>{
    h+=`<tr>`;
    headers.forEach(k=>{
      let v=r[k]??"",c="";
      if(k.toLowerCase()==="status"){
        const s=String(v).toLowerCase();
        if(s.includes("selesai"))c="status-selesai";
        if(s.includes("ready"))c="status-ready";
        if(s.includes("pemesanan"))c="status-pemesanan";
        if(s.includes("back"))c="status-backorder";
      }
      h+=`<td class="${c}">${v}</td>`;
    });
    h+=`</tr>`;
  });
  result.innerHTML=h+`</tbody></table></div>`+pager();
}

function sortBy(k){
  STATE.sort.asc=STATE.sort.key===k?!STATE.sort.asc:true;
  STATE.sort.key=k;
  STATE.data.sort((a,b)=>{
    const A=a[k],B=b[k];
    const nA=parseFloat(A),nB=parseFloat(B);
    const dA=Date.parse(A),dB=Date.parse(B);
    if(!isNaN(dA)&&!isNaN(dB)) return STATE.sort.asc?dA-dB:dB-dA;
    if(!isNaN(nA)&&!isNaN(nB)) return STATE.sort.asc?nA-nB:nB-nA;
    return STATE.sort.asc?String(A).localeCompare(String(B)):String(B).localeCompare(String(A));
  });
  render();
}

function pager(){
  const p=Math.ceil(STATE.data.length/ROWS);
  let h=`<div class="pagination">`;
  for(let i=1;i<=p;i++)
    h+=`<button class="${i===STATE.page?"active":""}" onclick="STATE.page=${i};render()">${i}</button>`;
  return h+`</div>`;
}

/* Footer year */
const y=new Date().getFullYear();
document.getElementById("year").textContent=y===2026?"2026":`2026 – ${y}`;
</script>

</body>
</html>
