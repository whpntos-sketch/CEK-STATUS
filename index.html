<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>INFORMASI STATUS ORDER</title>

<meta name="description" content="Cek status pesanan Order">
<meta name="robots" content="noindex,nofollow">

<style>
:root{
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --radius:14px;
  --shadow:0 16px 32px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Inter,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:56px 20px 96px;
  text-align:center;
  background:linear-gradient(180deg,#fff,#f1f5f9);
}
header h1{margin:0;font-size:2rem}
header p{margin-top:8px;color:var(--muted);font-size:.95rem}

/* SEARCH */
.search-card{
  max-width:520px;
  margin:-56px auto 24px;
  background:var(--card);
  padding:24px;
  border-radius:var(--radius);
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}
.search-box{display:flex;gap:10px}
input{
  flex:1;
  padding:14px 16px;
  border-radius:10px;
  border:1px solid #e2e8f0;
}
input:focus,button:focus{
  outline:3px solid var(--primary-soft);
  border-color:var(--primary);
}
button{
  padding:14px 22px;
  border-radius:10px;
  border:none;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.6;cursor:not-allowed}

/* CONTENT */
.container{max-width:1100px;margin:auto;padding:0 16px 64px}

/* MESSAGE */
.message{text-align:center;padding:32px 0;color:var(--muted);font-weight:500}

/* SUCCESS */
.alert-success{
  background:#ecfeff;
  border-left:5px solid var(--primary);
  padding:14px 16px;
  border-radius:10px;
  margin-bottom:16px;
  font-size:.9rem;
}

/* LOADER */
.loader{
  width:40px;height:40px;
  border:4px solid #e2e8f0;
  border-top:4px solid var(--primary);
  border-radius:50%;
  margin:32px auto;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABLE */
.table-card{
  background:white;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow-x:auto;
}
table{width:100%;border-collapse:collapse;font-size:.85rem;white-space:nowrap}
th,td{padding:14px 16px;text-align:center}

th{
  background:var(--primary-soft);
  color:var(--primary);
  cursor:pointer;
}
th.sort-asc::after{content:"▲";margin-left:6px;font-size:.7rem}
th.sort-desc::after{content:"▼";margin-left:6px;font-size:.7rem}

tbody tr:hover{background:#f1f5f9}

/* WRAP */
td.wrap{
  white-space:normal;
  word-break:break-word;
  text-align:left;
}

/* STATUS */
td[class^="status-"]{
  font-weight:700;
  text-transform:uppercase;
  border-radius:8px;
}
.status-selesai{background:#dcfce7;color:#15803d}
.status-pemesanan{background:#fef9c3;color:#92400e}
.status-backorder{background:#fee2e2;color:#b91c1c}
.status-ready{background:#dbeafe;color:#1e40af}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:6px;padding:20px}
.pagination button{background:#e2e8f0;padding:8px 14px;border-radius:8px}
.pagination button.active{background:var(--primary);color:white}

/* INFO */
.info-hero{margin-top:24px;display:flex;justify-content:center}
.info-card{
  background:var(--primary-soft);
  max-width:720px;
  padding:20px;
  border-radius:var(--radius);
  font-size:.85rem;
}

footer{text-align:center;padding:48px 16px;font-size:.8rem;color:var(--muted)}
footer strong{color:var(--primary)}

@media(max-width:600px){
  header h1{font-size:1.6rem}
  .search-box{flex-direction:column}
}
</style>
</head>

<body>

<header>
  <h1>INFORMASI ORDER</h1>
  <p>Data Progres Order & Update Detail Status Pesanan </p>
</header>

<div class="search-card">
  <div class="search-box">
    <input id="telepon" type="tel" maxlength="15" placeholder="NOMOR HANDPHONE - Life's Good" inputmode="numeric">
    <button onclick="cekStatus()">PERIKSA</button>
  </div>
</div>

<div class="container">
  <div id="result"></div>
</div>

<footer>
  © <span id="year"></span> · UnOfficial by <strong>Madētha</strong>
</footer>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const ROWS=5;
const CACHE_TTL=3*60*1000;

const HIDDEN_COLUMNS=["UID","Nomor","KODE PART"];
const STATE={data:[],page:1,sort:{key:null,asc:true}};
const result=document.getElementById("result");
const telInput=document.getElementById("telepon");
const btn=document.querySelector("button");

/* INPUT */
["input","paste"].forEach(e=>{
  telInput.addEventListener(e,()=>telInput.value=telInput.value.replace(/\D/g,""));
});
telInput.addEventListener("keydown",e=>e.key==="Enter"&&cekStatus());

function showMessage(t){
  result.innerHTML=`<div class="message">${t}</div>`;
}
function showLoader(){
  result.innerHTML=`<div class="loader"></div>`;
}
function showSuccess(n){
  const el=document.createElement("div");
  el.className="alert-success";
  el.innerHTML=`📑 <strong>${n}</strong> order ditemukan`;
  result.prepend(el);
}

const formatDate=v=>{
  const d=new Date(v);
  return isNaN(d)?v:d.toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});
};
const STATUS_MAP={
  selesai:"status-selesai",
  pemesanan:"status-pemesanan",
  backorder:"status-backorder",
  ready:"status-ready"
};
const normalizeStatus=s=>String(s).toLowerCase().replace(/\s+/g,"").replace("readi","ready");

/* CACHE */
function getCache(k){
  const r=localStorage.getItem(k);
  if(!r) return null;
  const {data,time}=JSON.parse(r);
  return Date.now()-time>CACHE_TTL?null:data;
}
const setCache=(k,d)=>localStorage.setItem(k,JSON.stringify({data:d,time:Date.now()}));

async function cekStatus(){
  if(btn.disabled) return;
  btn.disabled=true;

  const tel=telInput.value;
  if(tel.length<8){
    btn.disabled=false;
    return showMessage("☎ Data yang anda cari tidak sesuai, mohon cek data input");
  }

  const key="cekstatus_"+tel;
  const cached=getCache(key);
  if(cached){
    STATE.data=cached;
    STATE.page=1;
    btn.disabled=false;
    return render();
  }

  showLoader();
  try{
    const r=await fetch(`${API_URL}?telepon=${encodeURIComponent(tel)}`);
    const j=await r.json();
    STATE.data=Array.isArray(j)?j:[];
    setCache(key,STATE.data);
    STATE.page=1;
    render();
  }catch{
    showMessage("⚠️ GAGAL MENGAMBIL DATA");
  }finally{btn.disabled=false}
}

function getActiveStatuses(){
  const set=new Set();
  STATE.data.forEach(r=>{
    if(r.Status) set.add(normalizeStatus(r.Status));
  });
  return set;
}

function render(){
  if(!STATE.data.length)
    return showMessage("📝 Data tidak ditemukan, periksa formulir silakan membuat order");

  result.innerHTML="";
  showSuccess(STATE.data.length);

  const headers=Object.keys(STATE.data[0]).filter(h=>!HIDDEN_COLUMNS.includes(h));
  const start=(STATE.page-1)*ROWS;
  const slice=STATE.data.slice(start,start+ROWS);

  let html=`<div class="table-card"><table><thead><tr>`;
  headers.forEach(h=>{
    const cls=STATE.sort.key===h?(STATE.sort.asc?"sort-asc":"sort-desc"):"";
    html+=`<th class="${cls}" onclick="sortBy('${h}')">${h}</th>`;
  });
  html+=`</tr></thead><tbody>`;

  slice.forEach(r=>{
    html+=`<tr>`;
    headers.forEach(k=>{
      let v=r[k]??"",c="",w="";
      if(/keperluan|keterangan/i.test(k)) w="wrap";
      if(/tanggal/i.test(k)) v=formatDate(v);
      if(k.toLowerCase()==="status") c=STATUS_MAP[normalizeStatus(v)]||"";
      html+=`<td class="${c} ${w}">${v}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table></div>`+pagination()+statusInfo(getActiveStatuses());
  result.innerHTML+=html;
}

function sortBy(k){
  STATE.sort.asc=STATE.sort.key===k?!STATE.sort.asc:true;
  STATE.sort.key=k;
  STATE.data.sort((a,b)=>{
    let A=a[k],B=b[k];
    const dA=new Date(A),dB=new Date(B);
    if(!isNaN(dA)&&!isNaN(dB)) return STATE.sort.asc?dA-dB:dB-dA;
    if(!isNaN(A)&&!isNaN(B)) return STATE.sort.asc?A-B:B-A;
    return STATE.sort.asc?String(A).localeCompare(String(B)):String(B).localeCompare(String(A));
  });
  render();
}

function pagination(){
  const pages=Math.ceil(STATE.data.length/ROWS);
  let h=`<div class="pagination">`;
  for(let i=1;i<=pages;i++)
    h+=`<button class="${i===STATE.page?"active":""}" onclick="STATE.page=${i};render()">${i}</button>`;
  return h+`</div>`;
}

function statusInfo(activeStatuses){
  const ITEMS={
    ready:`<li><b>READY</b> : Pesanan sudah tersedia, siap diambil atau dipickup oleh pelanggan</li>`,
    pemesanan:`<li><b>PEMESANAN</b> : Pesanan sedang dalam proses pemesanan ke Cabang atau Pusat Spare Part</li>`,
    backorder:`<li><b>BACKORDER</b> : Pesanan belum tersedia karena stok kosong atau menunggu produksi dari Supplier</li>`,
    selesai:`<li><b>SELESAI</b> : Pesanan telah selesai diproses dan dinyatakan selesai atau ditutup</li>`
  };

  let list="";
  activeStatuses.forEach(s=>{
    if(ITEMS[s]) list+=ITEMS[s];
  });

  return `
  <section class="info-hero">
    <div class="info-card">
      <strong>🪧 KETERANGAN STATUS :</strong>
      <ul>
        ${list}
        <li><i>* * * Detail keterangan tambahan mengacu pada tabel</i></li>
      </ul>
    </div>
  </section>`;
}

const y=new Date().getFullYear();
document.getElementById("year").textContent=y===2026?"2026":`2026 – ${y}`;
</script>

</body>
</html>
