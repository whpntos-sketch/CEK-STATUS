<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cek Status Pesanan</title>

<style>
/* ===== RESET & GLOBAL ===== */
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family: "Inter", "Segoe UI", sans-serif;
  background: #f5f7fa;
  color: #2c3e50;
}

/* ===== HEADER ===== */
header {
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: #fff;
  padding: 40px 20px 30px;
  text-align: center;
}

header h1 {
  margin: 0 0 20px;
  font-weight: 600;
  letter-spacing: 1px;
}

.search-box {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.search-box input {
  width: 280px;
  padding: 12px 14px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 15px;
}

.search-box button {
  padding: 12px 24px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: #00c6ff;
  color: #003a52;
  transition: 0.3s;
}
.search-box button:hover {
  background: #00a8e6;
}

/* ===== RESULT CONTAINER ===== */
#result {
  padding: 30px 20px;
  text-align: center;
}

/* ===== LOADING ===== */
.loading-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.spinner {
  width: 46px;
  height: 46px;
  border: 5px solid #e3e8ee;
  border-top: 5px solid #2a5298;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-weight: 500;
  color: #555;
}

/* ===== TABLE ===== */
table {
  width: 95%;
  max-width: 1100px;
  margin: auto;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

th, td {
  padding: 14px 12px;
  border-bottom: 1px solid #eef2f6;
  text-align: center;
  font-size: 14px;
}

th {
  background: #2a5298;
  color: white;
  font-weight: 600;
  cursor: pointer;
  position: relative;
}

th span {
  font-size: 10px;
  margin-left: 6px;
}

tr:hover {
  background: #f4f8ff;
}

/* ===== STATUS BADGE ===== */
td[class^="status-"] {
  border-radius: 6px;
  font-weight: 600;
}

.status-selesai {
  background: #e6f4ea;
  color: #1e7e34;
}
.status-pemesanan {
  background: #fff4e5;
  color: #8a6d3b;
}
.status-backorder {
  background: #fdecea;
  color: #a71d2a;
}
.status-readi {
  background: #e8f6fa;
  color: #117a8b;
}

/* ===== PAGINATION ===== */
.pagination {
  margin-top: 24px;
}

.pagination button {
  margin: 4px;
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  background: #dce6f5;
  cursor: pointer;
  font-weight: 500;
}

.pagination button:hover {
  background: #2a5298;
  color: #fff;
}
</style>
</head>

<body>

<header>
  <h1>CEK STATUS PESANAN</h1>
  <div class="search-box">
    <input type="text" id="telepon" placeholder="Contoh: 08123456789">
    <button onclick="cekStatus()">Cek Pesanan</button>
  </div>
</header>

<div id="result"></div>

<script>
/* ===== CONFIG ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbxlC1eZ1tWIGsYnjfYkKAgsfvnpRAtggw5wubUvszhlsNXHLM2Y_0bnqSP_QhgrZlAWdw/exec";
const API_KEY = "ISI_API_KEY_KAMU";
const ROWS_PER_PAGE = 5;

/* ===== STATE ===== */
let dataGlobal = [];
let currentPage = 1;
let sortConfig = { key: null, asc: true };

/* ===== VALIDASI ===== */
function validTelepon(v) {
  return /^[0-9]{9,14}$/.test(v);
}

/* ===== MAIN ===== */
async function cekStatus() {
  const telepon = document.getElementById("telepon").value.trim();
  const result = document.getElementById("result");

  if (!validTelepon(telepon)) {
    alert("Masukkan nomor telepon yang valid!");
    return;
  }

  result.innerHTML = `
    <div class="loading-wrapper">
      <div class="spinner"></div>
      <div class="loading-text">Mencari data pesanan...</div>
    </div>
  `;

  try {
    const res = await fetch(\`\${API_URL}?telepon=\${telepon}&key=\${API_KEY}\`);
    const json = await res.json();

    if (!Array.isArray(json) || json.length === 0) {
      result.innerHTML = "<p>Data pesanan tidak ditemukan</p>";
      return;
    }

    dataGlobal = json;
    currentPage = 1;
    renderTable();

  } catch (e) {
    result.innerHTML = "<p>Terjadi kesalahan sistem</p>";
  }
}

/* ===== UTIL ===== */
function formatTanggal(v) {
  const d = new Date(v);
  if (isNaN(d)) return v;
  return d.toLocaleDateString("id-ID", { day:"2-digit", month:"long", year:"numeric" });
}

/* ===== RENDER ===== */
function renderTable() {
  const result = document.getElementById("result");
  const headers = Object.keys(dataGlobal[0]).filter(h => !["UID","Nomor"].includes(h));

  const start = (currentPage - 1) * ROWS_PER_PAGE;
  const pageData = dataGlobal.slice(start, start + ROWS_PER_PAGE);

  let html = "<table><thead><tr>";
  headers.forEach(h => {
    const arrow = sortConfig.key === h ? (sortConfig.asc ? "▲" : "▼") : "";
    html += `<th onclick="sortTable('${h}')">${h}<span>${arrow}</span></th>`;
  });
  html += "</tr></thead><tbody>";

  pageData.forEach(row => {
    html += "<tr>";
    headers.forEach(h => {
      let val = row[h];
      let cls = "";
      if (h.toLowerCase().includes("tanggal")) val = formatTanggal(val);
      if (h.toLowerCase() === "status") cls = "status-" + val.toLowerCase();
      html += `<td class="${cls}">${val ?? "-"}</td>`;
    });
    html += "</tr>";
  });

  html += "</tbody></table>";
  html += renderPagination();
  result.innerHTML = html;
}

/* ===== SORT ===== */
function sortTable(key) {
  sortConfig.asc = sortConfig.key === key ? !sortConfig.asc : true;
  sortConfig.key = key;

  dataGlobal.sort((a, b) => {
    if (a[key] > b[key]) return sortConfig.asc ? 1 : -1;
    if (a[key] < b[key]) return sortConfig.asc ? -1 : 1;
    return 0;
  });

  renderTable();
}

/* ===== PAGINATION ===== */
function renderPagination() {
  const pages = Math.ceil(dataGlobal.length / ROWS_PER_PAGE);
  if (pages <= 1) return "";

  let html = "<div class='pagination'>";
  for (let i = 1; i <= pages; i++) {
    html += `<button onclick="goPage(${i})">${i}</button>`;
  }
  html += "</div>";
  return html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
}
</script>

</body>
</html>
